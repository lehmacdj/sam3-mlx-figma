<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background: #1e1e1e;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #studio {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    #fallback {
      display: none;
      padding: 16px;
      font-size: 12px;
      line-height: 1.5;
    }
    #fallback code {
      background: #2a2a2a;
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <iframe id="studio" src="http://localhost:3000/figma" allow="clipboard-write"></iframe>
  <div id="fallback">
    <strong>Studio not reachable.</strong>
    <p>Start it from the repo root:</p>
    <p><code>cd repo/app && ./run.sh</code></p>
    <p>Then close and reopen this plugin.</p>
  </div>
  <script>
    (function () {
      var studio = document.getElementById('studio');
      var fallback = document.getElementById('fallback');
      var pendingFromPlugin = [];
      var studioReady = false;

      // Detect whether the iframe loaded successfully. If it errors out (e.g.
      // localhost:3000 is down) `onload` still fires for the about:blank
      // fallback some browsers show, so we additionally check for studio
      // sending us its ready handshake within a timeout.
      var loadFailed = false;
      studio.addEventListener('error', function () {
        loadFailed = true;
      });

      setTimeout(function () {
        if (!studioReady) {
          studio.style.display = 'none';
          fallback.style.display = 'block';
        }
      }, 4000);

      function postToStudio(msg) {
        try {
          studio.contentWindow.postMessage(msg, '*');
        } catch (e) {
          // ignore — iframe may not be ready
        }
      }

      // Plugin sandbox -> iframe (Studio)
      window.addEventListener('message', function (event) {
        var data = event.data;
        if (!data) return;

        // From plugin sandbox: messages are wrapped in pluginMessage.
        if (data.pluginMessage) {
          if (studioReady) {
            postToStudio(data.pluginMessage);
          } else {
            pendingFromPlugin.push(data.pluginMessage);
          }
          return;
        }

        // From the Studio iframe: forward to plugin sandbox.
        if (event.source === studio.contentWindow && data.type) {
          if (data.type === 'ready') {
            studioReady = true;
            // flush queued plugin messages first
            while (pendingFromPlugin.length) {
              postToStudio(pendingFromPlugin.shift());
            }
            // tell plugin code we're ready so it can send the current selection
            parent.postMessage({ pluginMessage: { type: 'ready' } }, '*');
            return;
          }
          parent.postMessage({ pluginMessage: data }, '*');
        }
      });
    })();
  </script>
</body>
</html>
